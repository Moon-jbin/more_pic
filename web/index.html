<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="more_pic">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <meta name="author" content="모어픽">
  
  <!-- 카카오톡이 링크를 긁어갈 때 읽는 사진 주소 -->
  <meta property="og:image" content="https://more-pic.web.app/more_pic_logo.png">

  <!-- 트위터나 다른 앱들이 읽는 사진 주소 -->
  <meta name="twitter:image" content="https://more-pic.web.app/more_pic_logo.png">

  <!-- 카카오톡 / SNS 공유용 설명 (오픈그래프) -->
  <meta property="og:description" content="모어픽 공식몰에서 정제된 디자인과 명확한 정보를 기반으로 신뢰감을 주는 라이프스타일 제품을 만나보세요. 심플하고 투명한 쇼핑 경험을 제공합니다." />
  <meta property="og:title" content="모어픽 | 본질에 집중한 미니멀 쇼핑">
  <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"> -->

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.ico"/>
  <!-- web/index.html 의 <head> 내부 -->
  <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin />



  <title>모어픽</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pica/9.0.1/pica.min.js"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
